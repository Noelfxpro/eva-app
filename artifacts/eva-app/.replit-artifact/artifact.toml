kind = "web"
previewPath = "/"
title = "EVA — Verified Authorship"
version = "1.0.0"
id = "artifacts/eva-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19997

[services.development]
run = "pnpm --filter @workspace/eva-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eva-app", "run", "build" ]
publicDir = "artifacts/eva-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19997"
BASE_PATH = "/"
